<!DOCTYPE html>
<html>
<head>
<title>PoE Build Randomizer</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#0b0b0b;
  color:#eee;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* PANEL */
.panel{
  width:420px;
  padding:30px;
  border-radius:20px;
  background:#111;
  text-align:center;
  box-shadow:0 0 40px rgba(255,140,0,0.2);
}

.title{
  color:#ff9800;
  font-size:24px;
  margin-bottom:20px;
}

/* SLOTS */
.slot{
  margin:10px 0;
  padding:14px;
  background:#141414;
  border-radius:10px;
}

.value{
  font-size:18px;
  color:#ff9800;
}

/* BUTTONS */
button{
  margin-top:10px;
  padding:12px;
  width:100%;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.roll{background:#ff9800;}
.guide{background:#2196f3;}

/* TOGGLE */
.mode-toggle{
  position:relative;
  margin-top:15px;
  height:40px;
  display:flex;
  background:#1a1a1a;
  border-radius:10px;
  overflow:hidden;
}

.mode-option{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#777;
  cursor:pointer;
  z-index:2;
  font-size:13px;
}

.mode-option.active{color:#fff;}

.mode-slider{
  position:absolute;
  width:50%;
  height:100%;
  background:linear-gradient(135deg,#ff9800,#ff5722);
  border-radius:10px;
  transition:.25s;
}

.mode-status{
  margin-top:6px;
  font-size:12px;
  color:#ff9800;
}

/* CATEGORY FILTER */
.filter-bar{
  margin-top:15px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:center;
}

.filter-btn{
  padding:6px 10px;
  background:#1a1a1a;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
  color:#aaa;
}

.filter-btn.active{
  background:#ff9800;
  color:#fff;
}

/* SOURCE */
.source{
  margin-top:8px;
  font-size:11px;
  color:#777;
}
</style>
</head>

<body>

<div class="panel">

<div class="title">⚔️ POE 3.28 BUILD RANDOMIZER</div>

<div class="slot">Skill<div id="skill" class="value"></div></div>
<div class="slot">Ascendancy<div id="asc" class="value"></div></div>
<div class="slot">Category<div id="category" class="value"></div></div>

<button class="roll" onclick="roll()">🎲 Roll Build</button>
<button class="guide" onclick="openGuide()">📘 Open Guide</button>

<!-- CATEGORY FILTER -->
<div class="filter-bar">
  <div class="filter-btn active" data-cat="All">All</div>
  <div class="filter-btn" data-cat="Melee">Melee</div>
  <div class="filter-btn" data-cat="Bow">Bow</div>
  <div class="filter-btn" data-cat="Spell">Spell</div>
  <div class="filter-btn" data-cat="DoT">DoT</div>
  <div class="filter-btn" data-cat="Totem">Totem</div>
  <div class="filter-btn" data-cat="Minion">Minion</div>
</div>

<!-- MODE TOGGLE -->
<div class="mode-toggle">
  <div class="mode-slider" id="slider"></div>
  <div class="mode-option active" data-mode="chaos">CHAOS</div>
  <div class="mode-option" data-mode="smart">SMART</div>
</div>

<div id="modeStatus" class="mode-status">Mode: Chaos</div>
<div id="source" class="source"></div>

</div>

<script>

// ================= DATA =================
const builds = [
{skill:"Kinetic Fusillade",asc:"Hierophant",cat:"Totem",url:"https://maxroll.gg/poe/build-guides/kinetic-fusillade-ballista-hierophant-league-starter"},
{skill:"Righteous Fire",asc:"Chieftain",cat:"DoT",url:"https://mobalytics.gg/poe/builds/pohx-righteous-fire-chieftain"},
{skill:"Elemental Hit",asc:"Slayer",cat:"Melee",url:"https://mobalytics.gg/poe/profile/ruetoo/builds/elemental-hit-slayer-melee"},
{skill:"Lightning Arrow",asc:"Deadeye",cat:"Bow",url:"https://mobalytics.gg/poe/builds/lightning-arrow-deadeye"},
{skill:"Spark",asc:"Inquisitor",cat:"Spell",url:"https://www.youtube.com/watch?v=-r77tkqZSJc"},
{skill:"Righteous Fire",asc:"Inquisitor",cat:"DoT",url:"https://www.poe-vault.com/guides/righteous-fire-inquisitor-build-guide"},
{skill:"Summon Holy Relic of Conviction",asc:"Necromancer",cat:"Minion",url:"https://www.poe-vault.com/guides/holy-relic-necromancer-build-guide"},
{skill:"Cyclone",asc:"Slayer",cat:"Melee",url:"https://mobalytics.gg/poe/builds/cyclone-slayer"},
{skill:"Boneshatter",asc:"Slayer",cat:"Melee",url:"https://mobalytics.gg/poe/builds/boneshatter-slayer"},
{skill:"Tornado Shot",asc:"Deadeye",cat:"Bow",url:"https://mobalytics.gg/poe/builds/tornado-shot-deadeye"},
{skill:"Ice Shot of Penetration Miner",asc:"Deadeye",cat:"Spell",url:"https://maxroll.gg/poe/build-guides/ice-shot-of-penetration-miner-deadeye-league-starter"},  
{skill:"Essence Drain",asc:"Occultist",cat:"DoT",url:"https://mobalytics.gg/poe/builds/essence-drain-occultist"}
];

let current=null;
let smartMode=false;
let activeCategory="All";

// ================= FILTER =================
document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeCategory=btn.dataset.cat;
  };
});

// ================= TOGGLE =================
const slider=document.getElementById("slider");

document.querySelectorAll(".mode-option").forEach(o=>{
  o.onclick=()=>{
    document.querySelectorAll(".mode-option").forEach(x=>x.classList.remove("active"));
    o.classList.add("active");

    if(o.dataset.mode==="smart"){
      smartMode=true;
      slider.style.left="50%";
      modeStatus.innerText="Mode: Smart (Meta Builds)";
    }else{
      smartMode=false;
      slider.style.left="0%";
      modeStatus.innerText="Mode: Chaos";
    }
  };
});

// ================= LOGIC =================
function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function getFilteredBuilds(){
  if(activeCategory==="All") return builds;
  return builds.filter(b=>b.cat===activeCategory);
}

function roll(){
  let pool=getFilteredBuilds();
  if(pool.length===0) return;

  let build;

  if(smartMode){
    build = pick(pool);
  } else {
    let skills=[...new Set(pool.map(b=>b.skill))];
    let asc=[...new Set(pool.map(b=>b.asc))];

    build={
      skill:pick(skills),
      asc:pick(asc),
      cat:activeCategory,
      url:"https://www.google.com/search?q=poe+"+pick(skills)+"+build 3.28"
    };
  }

  current=build;

  skill.innerText=build.skill;
  asc.innerText=build.asc;
  category.innerText=build.cat;

  source.innerText = build.url.includes("poe-vault")
    ? "Source: PoE Vault"
    : build.url.includes("mobalytics")
    ? "Source: Mobalytics"
    : build.url.includes("maxroll")
    ? "Source: Maxroll"
    : "Source: Generated";
}

function openGuide(){
  if(!current) return;
  window.open(current.url,"_blank");
}

roll();

</script>

</body>
</html>
