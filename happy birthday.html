<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Olivia – Dragon Queen!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap');

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'MedievalSharp', cursive;
}

body {
    background: url('https://raw.githubusercontent.com/ssjtrio/Path-of-Exile/main/background.jpg') no-repeat center center fixed;
    background-size: cover;
    position: relative;
    color: #f5e9a8;
}

/* Optional subtle animation to simulate movement */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    background: url('https://raw.githubusercontent.com/ssjtrio/Path-of-Exile/main/background.jpg') repeat;
    background-size: cover;
    opacity: 0.2;
    animation: backgroundMove 60s linear infinite;
    z-index: 0;
}

@keyframes backgroundMove {
    0% { transform: translate(0,0); }
    50% { transform: translate(20px, 10px); }
    100% { transform: translate(0,0); }
}

#banner {
    position: absolute;
    top: 0;
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    z-index: 6;
}

#banner span {
    display: inline-block;
    font-size: 2.5em;
    color: #ff4500;
    text-shadow: 0 0 10px #ff0000, 0 0 20px #ff8c00;
    padding-left: 100%;
    animation: scrollBanner 15s linear infinite;
}

@keyframes scrollBanner {
    0% { transform: translateX(0%); }
    100% { transform: translateX(-100%); }
}

h1 {
    position: absolute;
    top: 60px;
    width: 100%;
    text-align: center;
    font-size: 3em;
    text-shadow: 0 0 15px #ff4d4d;
    z-index: 5;
}

/* Olivia fully animated */
#olivia {
    width: 400px;
    border: 4px solid gold;
    border-radius: 16px;
    position: absolute;
    left: 50%;
    bottom: 15%;
    transform: translateX(-50%);
    z-index: 4;
    animation: breathe 3s ease-in-out infinite, glow 2s ease-in-out infinite alternate, sway 4s ease-in-out infinite;
    box-shadow: 0 0 25px gold;
}

@keyframes breathe {
    0%,100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
    50% { transform: translateX(-50%) translateY(-8px) rotate(0deg); }
}

@keyframes glow {
    0% { box-shadow: 0 0 25px gold; }
    50% { box-shadow: 0 0 45px gold; }
    100% { box-shadow: 0 0 25px gold; }
}

@keyframes sway {
    0% { transform: translateX(-50%) translateY(0) rotate(0deg); }
    25% { transform: translateX(-52%) translateY(-2px) rotate(-1deg); }
    50% { transform: translateX(-50%) translateY(0) rotate(0deg); }
    75% { transform: translateX(-48%) translateY(-2px) rotate(1deg); }
    100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
}

/* Dragon and fire styles */
.dragon { position: absolute; width: 90px; animation: flap 0.5s infinite alternate; z-index: 3; }
@keyframes flap { 0% { transform: scaleY(1) rotate(0deg); } 50% { transform: scaleY(0.9) rotate(2deg); } 100% { transform: scaleY(1) rotate(-2deg); } }
.particle { position: absolute; width: 6px; height: 6px; border-radius: 50%; opacity: 0.8; pointer-events: none; z-index: 3; }
</style>
</head>
<body>

<div id="banner"><span>🔥 Slay, you Dragon Queen! 🔥</span></div>
<h1>Happy Birthday Olivia! 👑</h1>
<img id="olivia" src="https://raw.githubusercontent.com/ssjtrio/Path-of-Exile/main/olivia.png" alt="Olivia">

<audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" type="audio/mpeg">
</audio>

<script>
const dragonURL = "https://www.transparentpng.com/thumb/dragon/qWQgub-flying-dragon.png";
const fireColors = ['#ff4500','#ff8c00','#ffd700'];
const dragons = [];
const numDragons = 4;

for(let i=0;i<numDragons;i++){
    const d = document.createElement('img');
    d.src = dragonURL;
    d.className = 'dragon';
    d.style.left = Math.random() * window.innerWidth + 'px';
    d.style.top = Math.random() * (window.innerHeight*0.7) + 'px';
    document.body.appendChild(d);

    dragons.push({
        el: d,
        vx: (Math.random()*1.5+0.5)*(Math.random()<0.5?-1:1),
        vy: (Math.random()*1.5+0.5)*(Math.random()<0.5?-1:1),
        fireCooldown: Math.floor(Math.random()*200)
    });
}

function animateDragons(){
    dragons.forEach(d=>{
        let x = parseFloat(d.el.style.left);
        let y = parseFloat(d.el.style.top);
        x += d.vx; y += d.vy;
        if(x < 0 || x > window.innerWidth-90) d.vx*=-1;
        if(y < 0 || y > window.innerHeight-90) d.vy*=-1;
        d.el.style.left = x+'px';
        d.el.style.top = y+'px';
        d.fireCooldown--;
        if(d.fireCooldown<=0){ shootFire(x+45,y+45,d.vx,d.vy); d.fireCooldown = 150+Math.random()*150; }
    });
    requestAnimationFrame(animateDragons);
}

function shootFire(x,y,vx,vy){
    for(let i=0;i<10;i++){
        const p = document.createElement('div');
        p.className='particle';
        p.style.backgroundColor = fireColors[Math.floor(Math.random()*fireColors.length)];
        p.style.left = x+'px';
        p.style.top = y+'px';
        document.body.appendChild(p);
        let life = 0;
        const anim = setInterval(()=>{
            life++;
            p.style.left = x + vx*life*6 + (Math.random()*20-10)+'px';
            p.style.top = y + vy*life*6 + (Math.random()*20-10)+'px';
            p.style.opacity = 1-life/20;
            if(life>=20){ clearInterval(anim); p.remove(); }
        },16);
    }
}

document.body.addEventListener('click',(evt)=>{
    for(let i=0;i<20;i++){
        const p = document.createElement('div');
        p.className='particle';
        p.style.backgroundColor = fireColors[Math.floor(Math.random()*fireColors.length)];
        p.style.left = evt.clientX+'px';
        p.style.top = evt.clientY+'px';
        document.body.appendChild(p);
        setTimeout(()=>p.remove(),1200);
    }
});

animateDragons();
</script>
</body>
</html>
